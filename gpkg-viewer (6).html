<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPKG Kortaskoðari</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
:root{--bg:#f0f0ed;--surface:#fff;--border:#dddcd8;--border2:#e8e8e4;--accent:#1a6b3c;--accent2:#0f4fa8;--text:#1a1a18;--muted:#888884;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:-.5px;white-space:nowrap;}
.logo span{color:var(--text);}
.hdr-btn{background:var(--accent);color:#fff;border:none;padding:6px 13px;border-radius:5px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;}
.hdr-btn:hover{background:#155930;}.hdr-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
#file-input,#qml-input-global{display:none;}
.file-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.main{display:flex;flex:1;overflow:hidden;}
#sidebar{width:285px;background:#fafaf8;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-section{padding:9px 12px 6px;border-bottom:1px solid var(--border2);font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
#layer-count{background:var(--border);color:var(--text);padding:1px 7px;border-radius:10px;font-size:9px;}
#layer-list{flex:1;overflow-y:auto;padding:5px;}
#layer-list::-webkit-scrollbar{width:3px;}#layer-list::-webkit-scrollbar-thumb{background:var(--border);}
/* Layer card */
.layer-item{border-radius:7px;border:1px solid transparent;margin-bottom:5px;overflow:hidden;background:white;}
.layer-item.active{border-color:rgba(26,107,60,.18);}
.layer-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;}
.layer-row:hover{background:rgba(0,0,0,.02);}
.layer-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1.5px solid rgba(0,0,0,.12);}
.layer-info{flex:1;overflow:hidden;}
.layer-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.layer-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px;}
.layer-toggle{width:26px;height:15px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
.layer-toggle.on{background:var(--accent);}
.layer-toggle::after{content:'';position:absolute;width:11px;height:11px;background:white;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.layer-toggle.on::after{transform:translateX(11px);}
/* Controls row */
.ctrl-row{display:flex;align-items:center;gap:5px;padding:0 9px 8px;flex-wrap:wrap;border-top:1px solid var(--border2);}
.ctrl-row-inner{display:flex;align-items:center;gap:5px;width:100%;padding:6px 0 0;}
.ctrl-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);white-space:nowrap;}
.ctrl-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);transition:all .12s;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.on{background:rgba(26,107,60,.08);border-color:rgba(26,107,60,.3);color:var(--accent);}
.ctrl-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ctrl-clear{font-family:'DM Mono',monospace;font-size:9px;padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:#cc4444;margin-left:auto;}
/* Label field select */
.label-select{font-family:'DM Mono',monospace;font-size:9px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:white;color:var(--text);flex:1;min-width:0;}
.label-fields{display:flex;flex-direction:column;gap:3px;padding:4px 0 2px;width:100%;}
.lbl-check{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text);cursor:pointer;padding:1px 0;}
.lbl-check input{cursor:pointer;accent-color:var(--accent);width:11px;height:11px;}
.lbl-sep-wrap{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;border-top:1px solid var(--border2);padding-top:4px;}
.lbl-sep-input{font-family:'DM Mono',monospace;font-size:9px;width:36px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:white;color:var(--text);}
/* Map */
#map-container{flex:1;position:relative;}
#map{width:100%;height:100%;}
/* Labels CSS */
.feat-label{background:transparent!important;border:none!important;box-shadow:none!important;font-weight:600;pointer-events:none;white-space:nowrap;}
.feat-label::before{display:none!important;}
/* Drop/empty/loading */
#drop-overlay{position:absolute;inset:0;background:rgba(240,240,237,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:2000;pointer-events:none;opacity:0;transition:opacity .2s;}
#drop-overlay.visible{opacity:1;pointer-events:all;}
.drop-icon{font-size:44px;animation:float 2s ease-in-out infinite;}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.drop-text{font-size:19px;font-weight:700;color:var(--accent);}
.drop-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;z-index:5;}
#empty-state.hidden{display:none!important;}
.empty-icon{font-size:44px;opacity:.18;}.empty-title{font-size:16px;font-weight:700;opacity:.3;}
.empty-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:10px;z-index:2000;background:white;padding:22px 28px;border-radius:10px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.1);}
#loading.visible{display:flex;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
#info-panel{position:absolute;bottom:14px;right:14px;background:white;border:1px solid var(--border);border-radius:9px;padding:13px;min-width:200px;max-width:280px;z-index:500;display:none;max-height:260px;overflow-y:auto;box-shadow:0 3px 14px rgba(0,0,0,.08);}
#info-panel.visible{display:block;}
#info-panel h4{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.info-row{display:flex;gap:8px;font-size:11px;margin-bottom:4px;}
.info-key{color:var(--muted);font-family:'DM Mono',monospace;min-width:70px;flex-shrink:0;}
.info-val{color:var(--text);word-break:break-all;}
#info-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 5px;}
.stats-bar{padding:6px 12px;background:var(--surface);border-top:1px solid var(--border2);font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);display:flex;gap:12px;flex-shrink:0;}
.stat-val{color:var(--accent2);}
#debug{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:8px;padding:10px 12px;min-width:280px;max-width:380px;max-height:40vh;overflow-y:auto;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1);}
#debug h5{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;}
#debug-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0;}
.drow{display:flex;align-items:flex-start;gap:6px;margin-bottom:2px;line-height:1.5;}
.drow .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.d-ok .dot{background:#1a6b3c;}.d-err .dot{background:#cc3333;}.d-info .dot{background:#bbb;}
.drow span{font-family:'DM Mono',monospace;font-size:10px;word-break:break-all;}
.leaflet-container{background:#e8e8e4;}
</style>
</head>
<body>
<header>
  <div class="logo">GPKG<span>kort</span></div>
  <button class="hdr-btn" id="open-btn" onclick="document.getElementById('file-input').click()" disabled>↑ Opna .gpkg</button>
  <input type="file" id="file-input" accept=".gpkg,.gpkx"/>
  <input type="file" id="qml-input-global" accept=".qml"/>
  <span class="file-name" id="file-name-display">Hleð SQL.js…</span>
</header>
<div class="main">
  <div id="sidebar">
    <div class="sb-section">Lög <span id="layer-count">0</span></div>
    <div id="layer-list">
      <div style="padding:14px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.8;">Hlaðið upp .gpkg skrá<br>til að sjá lög</div>
    </div>
    <div class="stats-bar">Þættir: <span class="stat-val" id="stat-features">0</span> &nbsp;|&nbsp; Lög: <span class="stat-val" id="stat-layers">0</span></div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="empty-state">
      <div class="empty-icon">🗺️</div>
      <div class="empty-title">Kortið er tómt</div>
      <div class="empty-sub">Dragðu .gpkg skrá hingað eða smelltu á "Opna"</div>
    </div>
    <div id="drop-overlay">
      <div class="drop-icon">📦</div><div class="drop-text">Sleppa til að opna</div>
      <div class="drop-sub">.gpkg / .gpkx</div>
    </div>
    <div id="loading"><div class="spinner"></div><div class="load-text" id="load-msg">Les gögn…</div></div>
    <div id="info-panel">
      <button id="info-close" onclick="closeInfo()">✕</button>
      <h4>Eiginleikar</h4><div id="info-content"></div>
    </div>
    <div id="debug">
      <h5>Greining <button id="debug-close" onclick="document.getElementById('debug').style.display='none'">✕</button></h5>
      <div id="dlog"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
'use strict';

// ═══ Debug ════════════════════════════════════════════════════════════════════
function dlog(msg, cls='info') {
  const el = document.getElementById('dlog');
  const r = document.createElement('div');
  r.className = 'drow d-'+cls;
  r.innerHTML = `<div class="dot"></div><span>${msg}</span>`;
  el.appendChild(r); el.scrollTop = el.scrollHeight;
  console[cls==='err'?'error':'log']('[GPKG]', msg);
}

// ═══ Map ══════════════════════════════════════════════════════════════════════
const map = L.map('map',{zoomControl:true,attributionControl:true}).setView([64.9,-18.5],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO', maxZoom:20, subdomains:'abcd'
}).addTo(map);
dlog('Leaflet ✓','ok');

// ═══ Proj4 ════════════════════════════════════════════════════════════════════
proj4.defs('EPSG:3057','+proj=lcc +lat_1=64.25 +lat_2=65.75 +lat_0=65 +lon_0=-19 +x_0=500000 +y_0=500000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');
proj4.defs('EPSG:5325','+proj=lcc +lat_1=64.25 +lat_2=65.75 +lat_0=65 +lon_0=-19 +x_0=500000 +y_0=500000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');
proj4.defs('EPSG:8088','+proj=lcc +lat_1=64.25 +lat_2=65.75 +lat_0=65 +lon_0=-19 +x_0=500000 +y_0=500000 +ellps=GRS80 +units=m +no_defs');
proj4.defs('EPSG:32627','+proj=utm +zone=27 +datum=WGS84 +units=m +no_defs');
proj4.defs('EPSG:32628','+proj=utm +zone=28 +datum=WGS84 +units=m +no_defs');
proj4.defs('EPSG:4326','+proj=longlat +datum=WGS84 +no_defs');
proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +no_defs');
dlog('Proj4 ✓','ok');

let toWGS84 = (x,y) => [x,y];

function detectProjection(db) {
  let srid = null;
  try { const r=db.exec("SELECT srs_id FROM gpkg_geometry_columns LIMIT 1"); if(r[0]&&r[0].values.length) srid=r[0].values[0][0]; } catch(e){}
  if (!srid) { try { const r=db.exec("SELECT srs_id FROM gpkg_contents WHERE data_type='features' LIMIT 1"); if(r[0]&&r[0].values.length) srid=r[0].values[0][0]; } catch(e){} }
  dlog('SRID: '+srid);
  if (!srid || srid===4326) { toWGS84=(x,y)=>[x,y]; return; }
  const key = 'EPSG:'+srid;
  if (proj4.defs(key)) { toWGS84=(x,y)=>proj4(key,'EPSG:4326',[x,y]); dlog(key+' ✓','ok'); return; }
  // Try reading WKT from gpkg_spatial_ref_sys
  try {
    const r=db.exec(`SELECT definition FROM gpkg_spatial_ref_sys WHERE srs_id=${srid} LIMIT 1`);
    if (r[0]&&r[0].values.length) {
      const wkt=r[0].values[0][0]||'';
      if (wkt && wkt!=='undefined') { proj4.defs(key,wkt); toWGS84=(x,y)=>proj4(key,'EPSG:4326',[x,y]); dlog('WKT ✓','ok'); return; }
    }
  } catch(e){}
  // Fallback: Icelandic LCC
  dlog('Óþekkt SRID '+srid+' → ISN93','err');
  toWGS84=(x,y)=>{ try{return proj4('EPSG:3057','EPSG:4326',[x,y]);}catch(e){return[x,y];} };
}

// ═══ SVG Pattern registry ═════════════════════════════════════════════════════
let _svgDefs = null;
const _patCache = {};

function getSVGDefs() {
  if (_svgDefs) return _svgDefs;
  const svgEl = document.querySelector('#map svg');
  if (!svgEl) return null;
  let defs = svgEl.querySelector('defs');
  if (!defs) { defs=document.createElementNS('http://www.w3.org/2000/svg','defs'); svgEl.insertBefore(defs,svgEl.firstChild); }
  return (_svgDefs = defs);
}

function makePattern(id, width, height, angle, svgContent) {
  if (_patCache[id]) return 'url(#'+id+')';
  const defs = getSVGDefs(); if (!defs) return null;
  const pat = document.createElementNS('http://www.w3.org/2000/svg','pattern');
  pat.setAttribute('id',id);
  pat.setAttribute('patternUnits','userSpaceOnUse');
  pat.setAttribute('width',width);
  pat.setAttribute('height',height);
  if (angle) pat.setAttribute('patternTransform',`rotate(${angle})`);
  pat.innerHTML = svgContent;
  defs.appendChild(pat);
  _patCache[id] = true;
  return 'url(#'+id+')';
}

// LinePatternFill: diagonal parallel lines
function makeHatch(angle, distanceMM, lineWidthMM, color, bgColor) {
  const sz   = Math.max(3, distanceMM * 3.78);
  const lw   = Math.max(0.3, lineWidthMM * 3.78);
  const id   = `h_${(angle*10)|0}_${(sz*10)|0}_${(lw*10)|0}_${color.replace(/[^\w]/g,'')}_${(bgColor||'').replace(/[^\w]/g,'')}`;
  if (_patCache[id]) return 'url(#'+id+')';
  const bg = bgColor ? `<rect width="${sz}" height="${sz}" fill="${bgColor}"/>` : '';
  const svg = `${bg}<line x1="${sz/2}" y1="0" x2="${sz/2}" y2="${sz}" stroke="${color}" stroke-width="${lw}"/>`;
  return makePattern(id, sz, sz, angle, svg);
}

// SVGFill: cross-hatch
function makeCrossHatch(angle, distanceMM, lineWidthMM, color) {
  const sz  = Math.max(3, distanceMM * 3.78);
  const lw  = Math.max(0.3, lineWidthMM * 3.78);
  const id  = `x_${(angle*10)|0}_${(sz*10)|0}_${(lw*10)|0}_${color.replace(/[^\w]/g,'')}`;
  const svg = `<line x1="${sz/2}" y1="0" x2="${sz/2}" y2="${sz}" stroke="${color}" stroke-width="${lw}"/>
               <line x1="0" y1="${sz/2}" x2="${sz}" y2="${sz/2}" stroke="${color}" stroke-width="${lw}"/>`;
  return makePattern(id, sz, sz, angle, svg);
}

// ═══ QML parser ═══════════════════════════════════════════════════════════════

function parseQML(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');

  // --- Renderer → styler function ---
  const renderer = doc.querySelector('renderer-v2');
  let styler = () => defStyle();
  if (renderer) {
    const type = renderer.getAttribute('type');
    dlog('QML renderer: '+type);
    switch(type) {
      case 'singleSymbol':      styler = buildSingleStyler(renderer);      break;
      case 'categorizedSymbol': styler = buildCategorizedStyler(renderer); break;
      case 'graduatedSymbol':   styler = buildGraduatedStyler(renderer);   break;
      case 'RuleRenderer':      styler = buildRuleStyler(renderer);        break;
      default: dlog('Óþekkt renderer: '+type,'err'); styler = buildSingleStyler(renderer);
    }
  }

  // --- Labeling ---
  const labelConfig = parseLabeling(doc);

  return { styler, labelConfig };
}

// ── Labeling parser ────────────────────────────────────────────────────────
function parseLabeling(doc) {
  const lab = doc.querySelector('labeling');
  if (!lab || lab.getAttribute('type') === 'no-labels') return null;

  const settings = lab.querySelector('settings') || lab;

  // Field name — try multiple locations
  let fieldName = null;
  const fe = settings.querySelector('fieldName');
  if (fe) fieldName = fe.textContent.trim();
  if (!fieldName) {
    const ts = settings.querySelector('text-style');
    if (ts) fieldName = ts.getAttribute('fieldName') || ts.getAttribute('field-name') || ts.getAttribute('field');
  }
  if (!fieldName) {
    // Try expression
    const expr = settings.querySelector('expr');
    if (expr) fieldName = expr.textContent.replace(/^"+|"+$/g,'').trim();
  }
  if (!fieldName) return null;

  // Text style
  const ts = settings.querySelector('text-style');
  const fontSize  = parseFloat((ts && (ts.getAttribute('fontSize') || ts.getAttribute('font-size'))) || '10');
  const fontColor = ts ? (ts.getAttribute('textColor') || ts.getAttribute('color') || '0,0,0,255') : '0,0,0,255';
  const bold      = ts ? (ts.getAttribute('fontWeight') === '75' || ts.getAttribute('bold') === '1') : false;
  const italic    = ts ? (ts.getAttribute('italic') === '1') : false;
  const fontFamily = ts ? (ts.getAttribute('fontFamily') || ts.getAttribute('font-family') || 'sans-serif') : 'sans-serif';

  // Buffer / halo
  const buf = settings.querySelector('text-buffer') || settings.querySelector('buffer');
  const bufOn    = buf ? (buf.getAttribute('bufferDraw') === '1' || buf.getAttribute('draw') === '1') : false;
  const bufSize  = buf ? parseFloat(buf.getAttribute('bufferSize') || buf.getAttribute('size') || '1') : 1;
  const bufColor = buf ? (buf.getAttribute('bufferColor') || buf.getAttribute('color') || '255,255,255,255') : '255,255,255,255';

  const colObj = qColor(fontColor);
  const bufObj = qColor(bufColor);

  dlog(`Labels: "${fieldName}", ${fontSize}pt, buf=${bufOn}`);

  return {
    fieldName,
    fontSize: Math.max(8, Math.min(fontSize, 24)),
    color: colObj.hex,
    bold,
    italic,
    fontFamily,
    bufferOn: bufOn,
    bufferSize: bufSize * 2,
    bufferColor: bufObj.hex
  };
}

// ── Symbol builders ────────────────────────────────────────────────────────
function readProps(layerEl) {
  const p = {};
  for (const prop of layerEl.querySelectorAll('prop'))                      p[prop.getAttribute('k')] = prop.getAttribute('v');
  for (const o    of layerEl.querySelectorAll('Option[name][value]'))       p[o.getAttribute('name')] = o.getAttribute('value');
  for (const o    of layerEl.querySelectorAll('data_defined_properties > Option[name][value]')) {} // skip data-defined for now
  return p;
}

function symbolToStyle(sym) {
  if (!sym) return defStyle();
  const symAlpha = parseFloat(sym.getAttribute('alpha') || '1');
  const layers   = [...sym.querySelectorAll(':scope > layer')];
  if (!layers.length) return defStyle();

  let result = { ...defStyle() };
  let hatchSet = false; // once a hatch is applied, don't override fill

  for (const layerEl of layers) {
    const ltype = (layerEl.getAttribute('class') || layerEl.getAttribute('type') || '').toLowerCase();
    const p = readProps(layerEl);
    const enabled = layerEl.getAttribute('enabled') !== '0';
    if (!enabled) continue;

    // ── LinePatternFill ───────────────────────────────────────────────────
    if (ltype.includes('linepattern') || ltype === 'linepatternfill') {
      const angle    = parseFloat(p['line_angle']    || p['angle']    || '45');
      const distance = parseFloat(p['line_distance'] || p['distance'] || '2');
      const lw       = parseFloat(p['line_width']    || p['width']    || '0.26');

      // The line colour inside LinePatternFill lives on a sub-symbol
      let lineColor = '#000';
      const subSym = layerEl.querySelector('symbol');
      if (subSym) {
        const subStyle = symbolToStyle(subSym);
        lineColor = subStyle.color || '#000';
      } else {
        lineColor = qColor(p['color'] || p['line_color'] || '0,0,0,255').hex;
      }

      // Background fill colour (from outline/fill props of the parent)
      const bgRaw = p['outline_color'] || p['color_border'] || null;
      const bgColor = null; // leave transparent — let SimpleFill below provide bg

      const url = makeHatch(angle, distance, lw, lineColor, bgColor);
      if (url) { result.fillColor = url; result.fillOpacity = symAlpha; hatchSet = true; }

      // Outline
      const outW = parseFloat(p['outline_width'] || '0.26');
      const outC = qColor(p['outline_color'] || p['color_border'] || '0,0,0,255');
      result.color   = outC.hex;
      result.weight  = Math.max(0.5, outW * 3);
      result.opacity = (outC.a / 255) * symAlpha;
      continue;
    }

    // ── SVGFill / PointPatternFill → approximate as cross-hatch ──────────
    if (ltype.includes('svgfill') || ltype.includes('pointpattern')) {
      const dist = parseFloat(p['distance_x'] || p['distance'] || '3');
      const col  = qColor(p['color'] || '0,0,0,255');
      const url  = makeCrossHatch(0, dist, 0.5, col.hex);
      if (url && !hatchSet) { result.fillColor = url; result.fillOpacity = symAlpha; hatchSet = true; }
      continue;
    }

    // ── SimpleFill ────────────────────────────────────────────────────────
    if (ltype === '' || ltype === 'simplefill' || ltype === 'fill') {
      const fillStyle = p['style'] || p['brush_style'] || 'solid';
      const fill      = qColor(p['color'] || p['fillColor'] || '128,128,128,255');
      const stroke    = qColor(p['outline_color'] || p['color_border'] || p['line_color'] || '0,0,0,255');
      const outW      = parseFloat(p['outline_width'] || '0.26');

      if (!hatchSet) {
        if (fillStyle === 'no' || fillStyle === 'NoBrush') {
          result.fillOpacity = 0;
        } else {
          result.fillColor   = fill.hex;
          result.fillOpacity = (fill.a / 255) * symAlpha;
        }
      }
      result.color   = stroke.hex;
      result.weight  = Math.max(0.5, outW * 3);
      result.opacity = (stroke.a / 255) * symAlpha;
      continue;
    }

    // ── SimpleLine ────────────────────────────────────────────────────────
    if (ltype === 'simpleline' || ltype === 'line') {
      const s   = qColor(p['line_color'] || p['color'] || '0,0,0,255');
      const lw  = parseFloat(p['line_width'] || p['width'] || '0.26');
      const pen = p['penstyle'] || p['line_style'] || 'solid';
      result.color      = s.hex;
      result.weight     = Math.max(0.5, lw * 3);
      result.opacity    = (s.a / 255) * symAlpha;
      result.dashArray  = penStyleToDash(pen, lw * 3);
      result.fillOpacity = 0;
      continue;
    }

    // ── SimpleMarker ─────────────────────────────────────────────────────
    if (ltype === 'simplemarker' || ltype === 'marker') {
      const fill   = qColor(p['color'] || p['fillColor'] || '128,128,128,255');
      const stroke = qColor(p['outline_color'] || p['color_border'] || '0,0,0,255');
      result.fillColor   = fill.hex;
      result.fillOpacity = (fill.a / 255) * symAlpha;
      result.color       = stroke.hex;
      result.weight      = parseFloat(p['outline_width'] || '0.4') * 3;
      result.opacity     = (stroke.a / 255) * symAlpha;
      result.radius      = Math.max(2, Math.min(parseFloat(p['size'] || '2') * 1.8, 20));
      continue;
    }
  }
  return result;
}

function penStyleToDash(pen, weight) {
  const w = Math.max(1, weight);
  switch(pen) {
    case 'dash':       return `${4*w},${2*w}`;
    case 'dot':        return `${w},${2*w}`;
    case 'dash dot':   return `${4*w},${2*w},${w},${2*w}`;
    case 'dash dot dot': return `${4*w},${2*w},${w},${2*w},${w},${2*w}`;
    default:           return null;
  }
}

function defStyle() {
  return { color:'#666', weight:1.5, opacity:.85, fillColor:'#999', fillOpacity:.25, radius:5, dashArray:null };
}

function qColor(str) {
  str = (str||'').trim();
  if (str.includes(',')) {
    const [r=0,g=0,b=0,a=255] = str.split(',').map(s=>parseInt(s,10));
    return { r,g,b,a, hex:`rgba(${r},${g},${b},${(a/255).toFixed(2)})` };
  }
  if (str.startsWith('#') && str.length===9) {
    const a=parseInt(str.slice(1,3),16), r=parseInt(str.slice(3,5),16), g=parseInt(str.slice(5,7),16), b=parseInt(str.slice(7,9),16);
    return { r,g,b,a, hex:`rgba(${r},${g},${b},${(a/255).toFixed(2)})` };
  }
  if (str.startsWith('#') && str.length===7) {
    const r=parseInt(str.slice(1,3),16), g=parseInt(str.slice(3,5),16), b=parseInt(str.slice(5,7),16);
    return { r,g,b,a:255, hex:str };
  }
  return { r:128,g:128,b:128,a:255, hex:'#808080' };
}

function symMap(renderer) {
  const m = {};
  for (const s of renderer.querySelectorAll(':scope > symbols > symbol'))
    m[s.getAttribute('name')] = symbolToStyle(s);
  return m;
}

function buildSingleStyler(r) {
  const s = symbolToStyle(r.querySelector(':scope > symbols > symbol'));
  return () => s;
}
function buildCategorizedStyler(r) {
  const attr = r.getAttribute('attr'), sm = symMap(r), cm = {};
  for (const c of r.querySelectorAll('categories > category'))
    cm[c.getAttribute('value')] = c.getAttribute('symbol');
  return (p) => {
    const v = String(p[attr] ?? '');
    return sm[cm[v] ?? cm[''] ?? Object.values(cm)[0]] || defStyle();
  };
}
function buildGraduatedStyler(r) {
  const attr = r.getAttribute('attr'), sm = symMap(r);
  const ranges = [...r.querySelectorAll('ranges > range')].map(el => ({
    lo:parseFloat(el.getAttribute('lower')), hi:parseFloat(el.getAttribute('upper')), sym:el.getAttribute('symbol')
  }));
  return (p) => { const v=parseFloat(p[attr]); const rng=ranges.find(r=>v>=r.lo&&v<=r.hi); return rng?(sm[rng.sym]||defStyle()):defStyle(); };
}
function buildRuleStyler(r) {
  const sm = symMap(r), rules = [];
  const collect = (el) => {
    for (const rule of el.querySelectorAll(':scope > rules > rule, :scope > rule')) {
      rules.push({ filter:(rule.getAttribute('filter')||'').trim(), sym:rule.getAttribute('symbol') });
      collect(rule);
    }
  };
  collect(r);
  return (p) => {
    for (const rule of rules) {
      if (!rule.filter || rule.filter==='ELSE' || evalFilter(rule.filter,p))
        if (rule.sym && sm[rule.sym]) return sm[rule.sym];
    }
    return defStyle();
  };
}
function evalFilter(filter, props) {
  try {
    let e = filter
      .replace(/"([^"]+)"/g,(_,f)=>{ const v=props[f]; return v===null||v===undefined?'null':typeof v==='number'?v:`"${String(v).replace(/"/g,'\\"')}"`; })
      .replace(/'([^']*)'/g,(_,s)=>`"${s}"`)
      .replace(/\bAND\b/g,'&&').replace(/\bOR\b/g,'||').replace(/\bNOT\b/g,'!')
      .replace(/\bIS NULL\b/g,'===null').replace(/\bIS NOT NULL\b/g,'!==null');
    return !!Function('"use strict";return('+e+')')();
  } catch(e){ return false; }
}

// ═══ Label helpers ════════════════════════════════════════════════════════════

// Compute a representative point for any GeoJSON geometry
function geomCentroid(geom) {
  if (!geom) return null;
  switch(geom.type) {
    case 'Point': return geom.coordinates;
    case 'MultiPoint': return geom.coordinates[0];
    case 'LineString': return midpoint(geom.coordinates);
    case 'MultiLineString': return midpoint(geom.coordinates[0]);
    case 'Polygon': return ringCentroid(geom.coordinates[0]);
    case 'MultiPolygon': {
      // Use the largest ring
      let best = null, bestArea = -1;
      for (const poly of geom.coordinates) {
        const a = Math.abs(ringArea(poly[0]));
        if (a > bestArea) { bestArea = a; best = poly[0]; }
      }
      return best ? ringCentroid(best) : null;
    }
    case 'GeometryCollection':
      return geom.geometries.length ? geomCentroid(geom.geometries[0]) : null;
    default: return null;
  }
}

function midpoint(coords) {
  const i = Math.floor(coords.length / 2);
  return coords[i];
}

function ringCentroid(ring) {
  if (!ring || ring.length < 3) return null;
  let x = 0, y = 0, area = 0;
  const n = ring.length;
  for (let i = 0; i < n - 1; i++) {
    const [x0,y0] = ring[i], [x1,y1] = ring[i+1];
    const cross = x0*y1 - x1*y0;
    area += cross;
    x += (x0+x1)*cross;
    y += (y0+y1)*cross;
  }
  area /= 2;
  if (Math.abs(area) < 1e-12) {
    // Degenerate — just average
    let ax=0,ay=0;
    for(const[cx,cy]of ring){ax+=cx;ay+=cy;}
    return [ax/(ring.length),ay/(ring.length)];
  }
  return [x/(6*area), y/(6*area)];
}

function ringArea(ring) {
  let a = 0;
  for (let i=0,n=ring.length-1; i<n; i++) a += ring[i][0]*ring[i+1][1] - ring[i+1][0]*ring[i][1];
  return a/2;
}

function buildLabelMarker(text, latlng, labelConfig) {
  const cfg = labelConfig;
  const fs = cfg.fontSize || 10;

  let textShadow = '';
  if (cfg.bufferOn) {
    const b = cfg.bufferColor;
    const s = Math.max(1, cfg.bufferSize);
    textShadow = `${s}px ${s}px 0 ${b}, -${s}px ${s}px 0 ${b}, ${s}px -${s}px 0 ${b}, -${s}px -${s}px 0 ${b}, 0 ${s}px 0 ${b}, 0 -${s}px 0 ${b}, ${s}px 0 0 ${b}, -${s}px 0 0 ${b}`;
  }

  const fontStyle = [
    cfg.bold   ? 'font-weight:700' : '',
    cfg.italic ? 'font-style:italic' : '',
    `font-size:${fs}px`,
    `color:${cfg.color}`,
    textShadow ? `text-shadow:${textShadow}` : '',
    `font-family:${cfg.fontFamily},sans-serif`,
    'white-space:nowrap',
    'pointer-events:none',
    'line-height:1'
  ].filter(Boolean).join(';');

  const icon = L.divIcon({
    className: 'feat-label',
    html: `<span style="${fontStyle}">${text}</span>`,
    iconAnchor: [0,0]
  });
  return L.marker(latlng, { icon, interactive:false, keyboard:false, zIndexOffset:-100 });
}

async function autoLoadGPKG(url) {
  document.getElementById('file-name-display').textContent = 'Hleð ' + url + '…';
  document.getElementById('loading').classList.add('visible');
  document.getElementById('empty-state').classList.add('hidden');
  try {
    dlog('Sæki GPKG: ' + url);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' – ' + url);
    const buf = await resp.arrayBuffer();
    document.getElementById('file-name-display').textContent = url;
    dlog('Sótt: ' + (buf.byteLength/1024).toFixed(0) + ' KB', 'ok');
    parseGPKG(new Uint8Array(buf));
    // Eftir að GPKG er lesið — sækja QML skrár sjálfkrafa
    if (Object.keys(AUTO_QML).length) await autoLoadQMLs();
  } catch(e) {
    dlog('Sjálfvirk hlöðun mistókst: ' + e.message, 'err');
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('file-name-display').textContent = 'Engin skrá valin…';
  }
}

async function autoLoadQMLs() {
  for (const [table, qmlUrl] of Object.entries(AUTO_QML)) {
    if (!LAYERS[table]) { dlog(`QML: lag "${table}" finnst ekki, sleppir`); continue; }
    try {
      dlog('Sæki QML: ' + qmlUrl);
      const resp = await fetch(qmlUrl);
      if (!resp.ok) { dlog(`QML ${qmlUrl}: HTTP ${resp.status}`, 'err'); continue; }
      const text = await resp.text();
      const {styler, labelConfig} = parseQML(text);
      const lo = LAYERS[table];
      lo.qmlStyler  = styler;
      lo.qmlName    = qmlUrl;
      if (labelConfig) {
        lo.labelConfig = labelConfig;
        if (labelConfig.fieldName) {
          lo.labelFields = [labelConfig.fieldName];
          dlog(`Label dálkur "${table}": ${labelConfig.fieldName}`, 'ok');
        }
      }
      redrawLayer(table);
      updateCtrlRow(table);
      dlog(`QML hlaðið: ${qmlUrl} → ${table}`, 'ok');
    } catch(e) {
      dlog(`QML villa (${qmlUrl}): ${e.message}`, 'err');
    }
  }
}

function loadGPKGFile(file) {
  if (!SQL) { dlog('SQL.js ekki tilbúið!','err'); return; }
  document.getElementById('file-name-display').textContent = file.name;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('dlog').innerHTML = '';
  document.getElementById('debug').style.display = '';
  dlog('Opnar: '+file.name+' ('+(file.size/1024).toFixed(0)+' KB)');
  const r = new FileReader();
  r.onload = e => { try { parseGPKG(new Uint8Array(e.target.result)); } catch(err) { dlog('Villa: '+err.message,'err'); document.getElementById('loading').classList.remove('visible'); } };
  r.readAsArrayBuffer(file);
}

// ═══ Parse GPKG ═══════════════════════════════════════════════════════════════
function parseGPKG(data) {
  let db;
  try { db=new SQL.Database(data); dlog('SQLite ✓','ok'); }
  catch(e) { dlog('SQLite: '+e.message,'err'); document.getElementById('loading').classList.remove('visible'); return; }

  detectProjection(db);

  let layers=[];
  try {
    const r=db.exec("SELECT table_name, identifier FROM gpkg_contents WHERE data_type='features'");
    if(r[0]&&r[0].values.length){ layers=r[0].values.map(v=>({table:v[0],name:v[1]||v[0]})); dlog('Lög: '+layers.map(l=>l.name).join(', '),'ok'); }
  } catch(e) { dlog('gpkg_contents: '+e.message,'err'); }

  if (!layers.length) {
    try {
      const t=db.exec("SELECT name FROM sqlite_master WHERE type='table'");
      if(t[0]) for(const[tn]of t[0].values){try{const ci=db.exec(`PRAGMA table_info("${tn}")`);if(ci[0]&&ci[0].values.some(c=>/geom|geometry|shape|wkb/i.test(c[1])))layers.push({table:tn,name:tn});}catch(e2){}}
    }catch(e){}
  }

  Object.values(LAYERS).forEach(l=>{try{map.removeLayer(l.group);map.removeLayer(l.labelGroup);}catch(e){}});
  LAYERS={}; totalFeatures=0;

  if (!layers.length) { dlog('Engin lög!','err'); document.getElementById('loading').classList.remove('visible'); return; }

  for (let i=0; i<layers.length; i++) {
    const layer=layers[i], color=COLORS[i%COLORS.length];
    document.getElementById('load-msg').textContent='Les: '+layer.name;

    // Geometry column
    let geomCol=null;
    try{const gc=db.exec(`SELECT column_name FROM gpkg_geometry_columns WHERE table_name='${layer.table}'`);if(gc[0]&&gc[0].values.length)geomCol=gc[0].values[0][0];}catch(e){}
    if(!geomCol){try{const ci=db.exec(`PRAGMA table_info("${layer.table}")`);if(ci[0]){const c=ci[0].values.find(c=>/geom|geometry|shape|wkb/i.test(c[1]));if(c)geomCol=c[1];}}catch(e){}}
    if(!geomCol){dlog(`"${layer.name}": geom dálkur finnst ekki!`,'err');continue;}

    let attrCols=[];
    try{const ci=db.exec(`PRAGMA table_info("${layer.table}")`);if(ci[0])attrCols=ci[0].values.filter(c=>c[1]!==geomCol&&!/^(fid|ogc_fid)$/i.test(c[1])).map(c=>c[1]);}catch(e){}

    let rows=null;
    try{const sel=[`"${geomCol}"`,...attrCols.map(c=>`"${c}"`)].join(',');const res=db.exec(`SELECT ${sel} FROM "${layer.table}" LIMIT 10000`);if(res[0])rows=res[0].values;}
    catch(e){try{const res=db.exec(`SELECT "${geomCol}" FROM "${layer.table}" LIMIT 10000`);if(res[0]){rows=res[0].values;attrCols=[];}}catch(e2){dlog(`Gat ekki sótt "${layer.name}": `+e2.message,'err');continue;}}

    const features=[]; let ok=0,skip=0,fail=0;
    if(rows){for(const row of rows){const blob=row[0];if(blob===null||blob===undefined){skip++;continue;}try{const geojson=gpkgBlobToGeoJSON(blob);if(!geojson){skip++;continue;}reprojectGeometry(geojson);const attrs={};attrCols.forEach((c,idx)=>attrs[c]=row[idx+1]);features.push({geojson,attrs});ok++;}catch(e){fail++;}}}
    dlog(`"${layer.name}": ${ok} ✓, ${skip} tóm, ${fail} villa`, ok>0?'ok':'err');

    const group=L.layerGroup().addTo(map);
    const labelGroup=L.layerGroup(); // not added until labels enabled
    LAYERS[layer.table]={group,labelGroup,color,name:layer.name,table:layer.table,attrCols,features,qmlStyler:null,labelConfig:null,labelFields:[],labelSep:' ',labelsOn:false,qmlName:null};

    if(!getSVGDefs()) setTimeout(()=>{ for(const{geojson,attrs}of features)addFeatureToGroup(geojson,attrs,color,null,group); },50);
    else for(const{geojson,attrs}of features) addFeatureToGroup(geojson,attrs,color,null,group);
    totalFeatures+=features.length;
  }

  db.close();
  dlog('Samtals: '+totalFeatures+' þættir','ok');
  buildSidebar(layers);
  document.getElementById('stat-features').textContent=totalFeatures.toLocaleString('is');
  document.getElementById('stat-layers').textContent=layers.length;
  fitAll();
  document.getElementById('loading').classList.remove('visible');
  if(totalFeatures===0) document.getElementById('empty-state').classList.remove('hidden');
}

// ═══ Reprojection ═════════════════════════════════════════════════════════════
function reprojectGeometry(geom) {
  if (!toWGS84) return;
  const rp = c => toWGS84(c[0],c[1]);
  switch(geom.type) {
    case 'Point':            geom.coordinates = rp(geom.coordinates); break;
    case 'MultiPoint':
    case 'LineString':       geom.coordinates = geom.coordinates.map(rp); break;
    case 'MultiLineString':
    case 'Polygon':          geom.coordinates = geom.coordinates.map(r=>r.map(rp)); break;
    case 'MultiPolygon':     geom.coordinates = geom.coordinates.map(p=>p.map(r=>r.map(rp))); break;
    case 'GeometryCollection': geom.geometries.forEach(g=>reprojectGeometry(g)); break;
  }
}

// ═══ WKB ══════════════════════════════════════════════════════════════════════
function gpkgBlobToGeoJSON(blob) {
  const buf=(blob instanceof Uint8Array)?blob:new Uint8Array(blob);
  if(buf.length<8||buf[0]!==0x47||buf[1]!==0x50) return null;
  const flags=buf[3],envInd=(flags>>1)&0x07,isEmpty=(flags>>4)&0x01;
  if(isEmpty) return null;
  const envBytes=[0,4,6,6,8][envInd<5?envInd:0]*8;
  const wkbStart=8+envBytes;
  if(buf.length<=wkbStart+5) return null;
  const r=readWKB(buf,wkbStart);
  return r?r.geom:null;
}
function readWKB(buf,pos){
  const dv=new DataView(buf.buffer,buf.byteOffset);
  if(pos+5>buf.length)return null;
  const le=dv.getUint8(pos)===1;pos++;
  const raw=le?dv.getUint32(pos,true):dv.getUint32(pos,false);pos+=4;
  let bt,hasZ=false,hasM=false;
  if(raw>=3000&&raw<4000){bt=raw-3000;hasZ=true;hasM=true;}
  else if(raw>=2000&&raw<3000){bt=raw-2000;hasM=true;}
  else if(raw>=1000&&raw<2000){bt=raw-1000;hasZ=true;}
  else if(raw>1000000){bt=raw&0xFFFF;hasZ=!!(raw&0x80000000);hasM=!!(raw&0x40000000);}
  else{bt=raw;}
  const ptB=(2+(hasZ?1:0)+(hasM?1:0))*8;
  const rd=(at)=>le?dv.getFloat64(at,true):dv.getFloat64(at,false);
  const ru=(at)=>le?dv.getUint32(at,true):dv.getUint32(at,false);
  const pt=(at)=>[rd(at),rd(at+8)];
  try{
    switch(bt){
      case 1:{const c=pt(pos);return{geom:{type:'Point',coordinates:c},end:pos+ptB};}
      case 2:{const n=ru(pos);pos+=4;const cs=[];for(let i=0;i<n;i++){cs.push(pt(pos));pos+=ptB;}return{geom:{type:'LineString',coordinates:cs},end:pos};}
      case 3:{const nr=ru(pos);pos+=4;const rings=[];for(let r=0;r<nr;r++){const n=ru(pos);pos+=4;const ring=[];for(let i=0;i<n;i++){ring.push(pt(pos));pos+=ptB;}rings.push(ring);}return{geom:{type:'Polygon',coordinates:rings},end:pos};}
      case 4:{const n=ru(pos);pos+=4;const ps=[];for(let i=0;i<n;i++){const s=readWKB(buf,pos);if(!s)break;ps.push(s.geom.coordinates);pos=s.end;}return{geom:{type:'MultiPoint',coordinates:ps},end:pos};}
      case 5:{const n=ru(pos);pos+=4;const ls=[];for(let i=0;i<n;i++){const s=readWKB(buf,pos);if(!s)break;ls.push(s.geom.coordinates);pos=s.end;}return{geom:{type:'MultiLineString',coordinates:ls},end:pos};}
      case 6:{const n=ru(pos);pos+=4;const ms=[];for(let i=0;i<n;i++){const s=readWKB(buf,pos);if(!s)break;ms.push(s.geom.coordinates);pos=s.end;}return{geom:{type:'MultiPolygon',coordinates:ms},end:pos};}
      case 7:{const n=ru(pos);pos+=4;const gs=[];for(let i=0;i<n;i++){const s=readWKB(buf,pos);if(!s)break;gs.push(s.geom);pos=s.end;}return{geom:{type:'GeometryCollection',geometries:gs},end:pos};}
      default:return null;
    }
  }catch(e){return null;}
}

// ═══ Feature rendering ════════════════════════════════════════════════════════
function addFeatureToGroup(geojson, attrs, fallbackColor, qmlStyler, group) {
  if (!_svgDefs) getSVGDefs();
  const style = qmlStyler ? qmlStyler(attrs) : {color:fallbackColor,weight:1.5,opacity:.85,fillColor:fallbackColor,fillOpacity:.25,radius:5,dashArray:null};
  const geoLayer = L.geoJSON(
    {type:'Feature',geometry:geojson,properties:attrs},
    {
      style:()=>({
        color:style.color, weight:style.weight, opacity:style.opacity,
        fillColor:style.fillColor, fillOpacity:style.fillOpacity,
        dashArray:style.dashArray||null, lineCap:'round', lineJoin:'round'
      }),
      pointToLayer:(_,ll)=>L.circleMarker(ll,{
        radius:style.radius||5, color:style.color, weight:style.weight||1.5,
        fillColor:style.fillColor, fillOpacity:style.fillOpacity, opacity:style.opacity
      })
    }
  );
  geoLayer.on('click',e=>{L.DomEvent.stopPropagation(e);showInfo(attrs);});
  geoLayer.addTo(group);
}

// ═══ Label rendering ══════════════════════════════════════════════════════════
function rebuildLabels(table) {
  const lo = LAYERS[table]; if (!lo) return;
  lo.labelGroup.clearLayers();
  if (!lo.labelsOn || !lo.labelFields || lo.labelFields.length === 0) return;

  const cfg = lo.labelConfig || {
    fontSize:10, color:'#1a1a18', bold:false, italic:false,
    fontFamily:'sans-serif', bufferOn:true, bufferSize:2, bufferColor:'rgba(255,255,255,0.8)'
  };
  const sep = lo.labelSep !== undefined ? lo.labelSep : ' ';

  for (const {geojson, attrs} of lo.features) {
    const parts = lo.labelFields
      .map(f => attrs[f])
      .filter(v => {
        if (v === null || v === undefined || v === '') return false;
        // Skip zero numeric values (e.g. numer = 0)
        if (v === 0 || v === '0' || (typeof v === 'number' && v === 0)) return false;
        if (typeof v === 'string' && v.trim() !== '' && !isNaN(Number(v)) && Number(v) === 0) return false;
        return true;
      });
    if (!parts.length) continue;
    const text = parts.join(sep);
    const coord = geomCentroid(geojson);
    if (!coord) continue;
    const latlng = L.latLng(coord[1], coord[0]);
    buildLabelMarker(text, latlng, cfg).addTo(lo.labelGroup);
  }
}

function toggleLabels(table) {
  const lo = LAYERS[table]; if (!lo) return;
  lo.labelsOn = !lo.labelsOn;
  if (lo.labelsOn) {
    lo.labelGroup.addTo(map);
    if (lo.labelGroup.getLayers().length === 0) rebuildLabels(table);
  } else {
    map.removeLayer(lo.labelGroup);
  }
  updateCtrlRow(table);
}

// Toggle a single field in/out of the label fields array
function toggleLabelField(table, field, checked) {
  const lo = LAYERS[table]; if (!lo) return;
  if (checked) {
    if (!lo.labelFields.includes(field)) lo.labelFields.push(field);
  } else {
    lo.labelFields = lo.labelFields.filter(f => f !== field);
  }
  lo.labelGroup.clearLayers();
  if (lo.labelsOn) rebuildLabels(table);
}

function setLabelSep(table, sep) {
  const lo = LAYERS[table]; if (!lo) return;
  lo.labelSep = sep;
  lo.labelGroup.clearLayers();
  if (lo.labelsOn) rebuildLabels(table);
}

// ═══ Redraw ═══════════════════════════════════════════════════════════════════
function redrawLayer(table) {
  const lo=LAYERS[table]; if(!lo) return;
  lo.group.clearLayers();
  for(const{geojson,attrs}of lo.features)
    addFeatureToGroup(geojson,attrs,lo.color,lo.qmlStyler,lo.group);
  if(lo.labelsOn) rebuildLabels(table);
}

// ═══ QML load ═════════════════════════════════════════════════════════════════
function openQMLPicker(table){qmlTargetTable=table;document.getElementById('qml-input-global').click();}
function loadQMLFile(file,table){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const {styler,labelConfig}=parseQML(e.target.result);
      const lo=LAYERS[table];
      lo.qmlStyler=styler;
      lo.qmlName=file.name;
      if(labelConfig){
        lo.labelConfig=labelConfig;
        if(labelConfig.fieldName){
          lo.labelFields=[labelConfig.fieldName];
          dlog(`Label dálkur: "${labelConfig.fieldName}"`, 'ok');
        }
      }
      redrawLayer(table);
      updateCtrlRow(table);
    }catch(err){dlog('QML villa: '+err.message,'err');}
  };
  r.readAsText(file);
}
function clearQML(table){
  const lo=LAYERS[table];
  lo.qmlStyler=null;lo.qmlName=null;lo.labelConfig=null;
  redrawLayer(table);updateCtrlRow(table);
}

// ═══ Sidebar ══════════════════════════════════════════════════════════════════
function buildSidebar(layers) {
  document.getElementById('layer-count').textContent=layers.length;
  const list=document.getElementById('layer-list');
  list.innerHTML='';
  layers.forEach(layer=>{
    const lo=LAYERS[layer.table];if(!lo)return;
    const item=document.createElement('div');
    item.className='layer-item active';item.dataset.table=layer.table;
    item.innerHTML=`
      <div class="layer-row">
        <div class="layer-swatch" data-table="${layer.table}" style="background:${lo.color}"></div>
        <div class="layer-info">
          <div class="layer-name">${layer.name||layer.table}</div>
          <div class="layer-meta">${lo.features.length.toLocaleString()} þ.</div>
        </div>
        <button class="layer-toggle on" onclick="toggleLayer(event,'${layer.table}')"></button>
      </div>
      <div class="ctrl-row" id="ctrl-row-${layer.table}">
        <div class="ctrl-row-inner">
          <button class="ctrl-btn" id="qml-btn-${layer.table}" onclick="openQMLPicker('${layer.table}')">+ QML stíll</button>
          <span class="ctrl-tag" id="qml-tag-${layer.table}"></span>
        </div>
        <div class="ctrl-row-inner" id="label-row-${layer.table}">
          <button class="ctrl-btn" id="lbl-btn-${layer.table}" onclick="toggleLabels('${layer.table}')">Letur</button>
          <div class="label-fields" id="lbl-fields-${layer.table}">
            ${lo.attrCols.map(c=>`
              <label class="lbl-check">
                <input type="checkbox" value="${c}" onchange="toggleLabelField('${layer.table}','${c}',this.checked)"> ${c}
              </label>`).join('')}
            <label class="lbl-sep-wrap">
              Bil: <input type="text" class="lbl-sep-input" value=" " maxlength="5"
                onchange="setLabelSep('${layer.table}',this.value)"
                oninput="setLabelSep('${layer.table}',this.value)">
            </label>
          </div>
        </div>
      </div>`;
    item.querySelector('.layer-row').addEventListener('click',e=>{if(!e.target.classList.contains('layer-toggle'))zoomTo(layer.table);});
    list.appendChild(item);
  });
}

function updateCtrlRow(table) {
  const lo=LAYERS[table];
  // QML button
  const qBtn=document.getElementById('qml-btn-'+table);
  const qTag=document.getElementById('qml-tag-'+table);
  const sw=document.querySelector(`.layer-swatch[data-table="${table}"]`);
  if(lo.qmlName){
    qBtn.textContent='↺ Skipta'; qBtn.classList.add('on');
    qTag.textContent=lo.qmlName;
    // Add clear button once
    if(!document.getElementById('qml-clr-'+table)){
      const clr=document.createElement('button');clr.className='ctrl-clear';clr.id='qml-clr-'+table;clr.textContent='✕';
      clr.onclick=()=>clearQML(table);
      document.getElementById('ctrl-row-'+table).querySelector('.ctrl-row-inner').appendChild(clr);
    }
    if(sw) sw.style.background='linear-gradient(135deg,#888 50%,'+lo.color+' 50%)';
  } else {
    qBtn.textContent='+ QML stíll'; qBtn.classList.remove('on');
    qTag.textContent='';
    const clr=document.getElementById('qml-clr-'+table);if(clr)clr.remove();
    if(sw) sw.style.background=lo.color;
  }
  // Label button
  const lBtn=document.getElementById('lbl-btn-'+table);
  if(lBtn) lBtn.classList.toggle('on', lo.labelsOn);
  // Sync checkboxes with lo.labelFields
  const fieldsDiv=document.getElementById('lbl-fields-'+table);
  if(fieldsDiv){
    fieldsDiv.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.checked=lo.labelFields.includes(cb.value);
    });
    const sepInput=fieldsDiv.querySelector('.lbl-sep-input');
    if(sepInput) sepInput.value=lo.labelSep!==undefined?lo.labelSep:' ';
  }
}

function toggleLayer(e,table){
  e.stopPropagation();
  const on=e.target.classList.toggle('on');
  const item=document.querySelector(`.layer-item[data-table="${table}"]`);
  if(on){LAYERS[table].group.addTo(map);if(LAYERS[table].labelsOn)LAYERS[table].labelGroup.addTo(map);item&&item.classList.add('active');}
  else{map.removeLayer(LAYERS[table].group);map.removeLayer(LAYERS[table].labelGroup);item&&item.classList.remove('active');}
}
function zoomTo(table){try{const b=LAYERS[table].group.getBounds();if(b.isValid())map.fitBounds(b,{padding:[40,40]});}catch(e){}}
function fitAll(){let b=null;Object.values(LAYERS).forEach(({group})=>{try{const gb=group.getBounds();if(gb.isValid())b=b?b.extend(gb):gb;}catch(e){}});if(b&&b.isValid())map.fitBounds(b,{padding:[50,50]});}
function showInfo(attrs){const entries=Object.entries(attrs).filter(([,v])=>v!==null&&v!==undefined&&v!=='');if(!entries.length)return;document.getElementById('info-content').innerHTML=entries.map(([k,v])=>`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('');document.getElementById('info-panel').classList.add('visible');}
function closeInfo(){document.getElementById('info-panel').classList.remove('visible');}
</script>
